

services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A app.infrastructure.celery_app worker --loglevel=info -E
    volumes:
      - .:/app
    depends_on:
      - redis

  flower:
    build: .
    command: celery -A app.infrastructure.celery_app flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
       
